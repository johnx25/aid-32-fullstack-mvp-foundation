name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aid32_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aid32_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aid32_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/aid32_ci?schema=public
      MIGRATION_URL: postgresql://postgres:postgres@127.0.0.1:5432/aid32_ci?schema=public
      SEED_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aid32_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Register page tests
        run: npm run test:register-page

      - name: Build
        run: npm run build

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Integration migrated DB flow
        run: npm run test:integration:supabase-flow
